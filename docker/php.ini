; Magento PHP Configuration
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 10000

; Error reporting (dev mode)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On

; Session — 12-hour idle window (was 1 year). After the June 2026
; breach, an unbounded session lifetime meant any session token
; stolen during the attack window remained valid indefinitely. 12h
; covers a full working day without a re-login while bounding the
; blast radius if a token leaks again. Magento's
; admin/security/session_lifetime in core_config_data should be
; tuned in parallel (4h is a reasonable admin idle window).
session.gc_maxlifetime = 43200
; Cookie lifetime: 0 = browser-session cookie. Deletes when the
; browser closes — combined with HttpOnly + (in prod) SameSite=Lax,
; this is the tightest reasonable default. Localhost dev sessions
; survive across the dev day because PHP's GC sweeps idle storage,
; not the cookie itself.
session.cookie_lifetime = 0
session.cookie_httponly = 1
; SameSite=Lax: cookie sent on top-level cross-site GETs (so
; bookmarks + email links still log in) but NOT on cross-site POSTs.
; This blocks the form-key-less CSRF variants flagged in the audit.
; Not setting cookie_secure here because localhost dev is HTTP —
; setting it would lock out the local admin. Prod hardening: add
;   Header always set Set-Cookie "...; Secure"
; via mod_headers in the Apache vhost instead.
session.cookie_samesite = "Lax"

; Date
date.timezone = Asia/Singapore

; OPcache — production-tuned defaults.
; Local dev re-enables validate_timestamps=1 via docker/php-local.ini (mounted
; through docker-compose.yml only). In prod (Coolify) opcache is reset on each
; container restart at deploy time, so timestamp validation per-request is
; pure overhead and we turn it off.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 100000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
; JIT disabled — Magento 1's codebase pre-dates JIT-friendly patterns;
; the tracing variant adds compile/de-opt overhead on cold paths that
; tends to outweigh any gain on hot paths. Re-enable + benchmark before
; flipping back on if a future upgrade improves JIT compatibility.
opcache.jit = off
opcache.jit_buffer_size = 0
opcache.huge_code_pages = 0

; Realpath cache — bigger & longer TTL to reduce filesystem hits
realpath_cache_size = 32768K
realpath_cache_ttl = 7200
