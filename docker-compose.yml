services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      # cached = Windows→Linux reads can be briefly stale, non-blocking — much faster
      - .:/var/www/html:cached
      - ./docker/php.ini:/usr/local/etc/php/conf.d/magento.ini
      # Local-only override: turns opcache.validate_timestamps back on for dev.
      # Loads after magento.ini (zz- prefix → alphabetical last). Not in prod image.
      - ./docker/php-local.ini:/usr/local/etc/php/conf.d/zz-local.ini
      # Mount Apache vhost so config tweaks (LogFormat, modules, etc.) apply on
      # `docker restart project-web-1` without needing a full image rebuild.
      - ./docker/apache-vhost.conf:/etc/apache2/sites-available/000-default.conf
      # Mount entrypoint.sh so the host's LF version overrides the baked-in
      # copy (Git for Windows can rewrite line endings to CRLF, breaking the
      # shebang). Same restart semantics — no rebuild needed.
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
      # Claude CLI credentials — mounted read-only from the host so the
      # in-container `claude` binary (installed by Dockerfile) reuses the
      # existing host login. Powers the admin "Generate SEO Meta with AI"
      # button. ${USERPROFILE} resolves to e.g. C:\Users\alish on Windows.
      # Need both: .claude/ (sessions, history) and .claude.json (account
      # config). Without the .json, the CLI still works but spews a noisy
      # "configuration file not found" warning on every invocation.
      - "${USERPROFILE}/.claude:/root/.claude:ro"
      - "${USERPROFILE}/.claude.json:/root/.claude.json:ro"
    tmpfs:
      # Move Magento's runtime caches off the Windows bind mount and into
      # in-container RAM. Bootstrap was reading ~5MB of small cache files
      # over the Windows→Linux fs boundary on every request, which alone
      # cost ~6s. tmpfs is RAM-backed so reads are essentially free; data
      # is volatile but Magento rebuilds these on miss anyway. Production
      # (Coolify's overlay fs on Linux) doesn't need this and uses the
      # baked image path.
      # mode=1777 = world-writable + sticky, so the www-data process can
      # create cache files. Default tmpfs is root-owned 0755 → unwritable.
      - /var/www/html/var/cache:mode=1777
      - /var/www/html/var/full_page_cache:mode=1777
      - /var/www/html/var/locks:mode=1777
    environment:
      - MAGE_IS_DEVELOPER_MODE=1
      - SKIP_MIGRATIONS=1
      # LOCAL_DB_MODE=1: entrypoint re-applies scripts/local-dev/apply-local-dev-urls.php
      # on every start, forcing all base_url config to http://localhost:8080/ so the
      # local storefront never 302-redirects to the production domains.
      - LOCAL_DB_MODE=1
      # Cloudflare R2 — consumed by MMD_CourseImage to upload course-cover
      # PNGs via S3-compatible PutObject. Values come from .env at project
      # root via Compose substitution. Production sets these in Coolify's
      # environment-variables panel (the .env file is gitignored). If any
      # is missing, the AI-Generate button surfaces the error
      # "R2 not configured. Required: …".
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      # Cloudflare Turnstile — read by MMD_MagentoCaptcha for the contact +
      # review forms. Production mirrors these in Coolify's env panel.
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
    depends_on:
      db_mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - magento_net

  # Redis backs the Magento object cache (Cm_Cache_Backend_Redis, db 0) and
  # PHP sessions (Cm_RedisSession, db 1). LOCAL ONLY — production Coolify has
  # no Redis service; the Dockerfile sed disables Cm_RedisSession.xml in the
  # image, and production local.xml omits the <cache> block, so prod falls
  # back to file cache + MySQL sessions. Re-enable in prod only after adding
  # a Redis service in Coolify.
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - magento_net

  db_mysql:
    image: mysql:5.7
    platform: linux/amd64
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --max_allowed_packet=256M
      --innodb_buffer_pool_size=512M
      --character-set-server=utf8
      --collation-server=utf8_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - magento_net

volumes:
  mysql_data:

networks:
  magento_net:
    driver: bridge
