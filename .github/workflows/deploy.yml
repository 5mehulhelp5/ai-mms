name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-gh:
    name: Redeploy Ghana (GH)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Ghana Coolify redeploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.COOLIFY_GH_DEPLOY_WEBHOOK }}")
          echo "Coolify response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Deploy trigger failed with HTTP $STATUS"
            exit 1
          fi
